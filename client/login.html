<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="KDPM Medical Association - Admin Login Portal">
  <title>KDPM Admin Login</title>
  <link rel="stylesheet" href="css/styles.css">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⚕️</text></svg>">
</head>
<body>
  <div class="login-page" id="loginPage">
    <div class="login-container">
      <div class="login-logo">
        <div class="logo-icon">⚕️</div>
        <h1>KDPM Medical Association</h1>
        <p>Member Management System</p>
      </div>

      <div class="login-error" id="loginError"></div>

      <form class="login-form" id="loginForm">
        <div class="form-group">
          <label for="email">Email Address</label>
          <input 
            type="email" 
            id="email" 
            name="email" 
            placeholder="admin@kdpm.org" 
            required 
            autocomplete="email"
          >
        </div>
        <div class="form-group">
          <label for="password">Password</label>
          <input 
            type="password" 
            id="password" 
            name="password" 
            placeholder="Enter your password" 
            required 
            autocomplete="current-password"
          >
        </div>
        <button type="submit" class="login-btn" id="loginBtn">
          Sign In
        </button>
      </form>
    </div>
  </div>

  <script src="js/auth.js"></script>
  <script>
    // If already logged in, redirect to dashboard
    if (AuthService.isAuthenticated()) {
      window.location.href = 'dashboard.html';
    }

    document.getElementById('loginForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      
      const btn = document.getElementById('loginBtn');
      const errorEl = document.getElementById('loginError');
      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;

      btn.disabled = true;
      btn.textContent = 'Signing in...';
      errorEl.classList.remove('show');

      try {
        await AuthService.login(email, password);
        window.location.href = 'dashboard.html';
      } catch (error) {
        errorEl.textContent = error.message || 'Invalid credentials. Please try again.';
        errorEl.classList.add('show');
        btn.disabled = false;
        btn.textContent = 'Sign In';
      }
    });
  </script>
</body>
</html>
